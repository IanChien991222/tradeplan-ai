<!DOCTYPE html>
<!-- TradePlan AI v2.0 -->
<html lang="zh-Hant" data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TradePlan AI</title>
//fonts.googleapis.com">
//fonts.gstatic.com" crossorigin>
//fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#0b1020;--panel:#11172a;--panel2:#161d34;--text:#edf2ff;--muted:#a6b2d9;--faint:#6f7b9f;--primary:#3dd9b3;--border:rgba(184,198,255,.14);--error:#ff6b7a;--warn:#ffb84d;--ok:#6dde8f;--r:18px}
*{box-sizing:border-box}
body{margin:0;font-family:Inter,sans-serif;background:linear-gradient(180deg,#090d19 0%,#0b1020 100%);color:var(--text)}
.wrap{width:min(calc(100% - 24px),1180px);margin:0 auto;padding:24px 0 56px}
.top{display:flex;justify-content:space-between;gap:16px;align-items:center;margin-bottom:24px}
.brand{font-weight:800;font-size:18px}
.pill{border:1px solid var(--border);padding:10px 14px;border-radius:999px;color:var(--muted);font-size:13px}
.grid{display:grid;grid-template-columns:420px 1fr;gap:24px}
.card{background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:var(--r);padding:24px}
h1,h2{margin:0 0 10px}
h2{font-size:16px}
p{color:var(--muted);margin:0 0 16px;font-size:14px}
.field{display:grid;gap:8px;margin-bottom:16px}
label{font-size:13px;font-weight:600;color:var(--muted)}
input,select,textarea{width:100%;background:#08101e;color:var(--text);border:1px solid var(--border);border-radius:12px;padding:14px;font:inherit;font-size:14px;outline:none;transition:border .2s}
input:focus,select:focus,textarea:focus{border-color:var(--primary)}
textarea{min-height:180px;resize:vertical;font-family:monospace;font-size:13px}
.two{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.btns{display:flex;flex-wrap:wrap;gap:10px;margin-top:4px}
button{border:0;border-radius:12px;padding:13px 18px;cursor:pointer;font:inherit;font-size:14px;font-weight:600;transition:opacity .2s}
button:hover{opacity:.85}
.primary{background:linear-gradient(180deg,var(--primary),#2bc5a0);color:#03110e}
.ghost{background:rgba(255,255,255,.05);color:var(--text);border:1px solid var(--border)}
.ghost.danger{border-color:rgba(255,107,122,.3);color:var(--error)}

/* alert banner */
.alert{padding:14px 18px;border-radius:14px;font-size:13px;margin-bottom:16px;display:flex;gap:10px;align-items:flex-start;line-height:1.5}
.alert.warn{background:rgba(255,184,77,.08);border:1px solid rgba(255,184,77,.25);color:var(--warn)}
.alert.err{background:rgba(255,107,122,.08);border:1px solid rgba(255,107,122,.25);color:var(--error)}
.alert.ok{background:rgba(109,222,143,.08);border:1px solid rgba(109,222,143,.25);color:var(--ok)}
.alert-icon{font-size:16px;flex-shrink:0}

/* result banner */
.banner{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:18px 20px;border-radius:16px;background:rgba(61,217,179,.08);border:1px solid rgba(61,217,179,.2);margin-bottom:16px}
.banner.no-trade{background:rgba(255,107,122,.08);border-color:rgba(255,107,122,.2)}
.bias-label{font-size:24px;font-weight:800}
.bias-label.long{color:var(--primary)}
.bias-label.short{color:var(--error)}
.bias-label.no-trade{color:var(--warn)}
.conf{font-size:13px;color:var(--muted)}

.metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:12px}
.targets{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:12px}
.mini{padding:14px 16px;border-radius:14px;background:rgba(255,255,255,.025);border:1px solid var(--border)}
.mini span{display:block;color:var(--faint);font-size:11px;margin-bottom:6px;text-transform:uppercase;letter-spacing:.05em}
.mini strong{font-size:15px;font-weight:700}
.mini strong.long{color:var(--primary)}
.mini strong.short{color:var(--error)}
.mini strong.warn{color:var(--warn)}

.reason-list{padding-left:18px;color:var(--muted);font-size:14px;margin:0 0 16px}
.reason-list li{margin-bottom:6px}

.json-block{background:#08101e;border:1px solid var(--border);border-radius:14px;padding:16px;overflow:auto;color:#c9f8ea;font-size:12px;font-family:monospace;max-height:300px;margin:0}

.loader{display:none;text-align:center;padding:40px;color:var(--muted);font-size:14px}
.loader.active{display:block}
.spinner{display:inline-block;width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .7s linear infinite;margin-bottom:12px}
@keyframes spin{to{transform:rotate(360deg)}}

.section-title{font-size:13px;font-weight:700;color:var(--faint);text-transform:uppercase;letter-spacing:.07em;margin:16px 0 10px}

.backend-row{display:flex;gap:10px;align-items:flex-end}
.backend-row .field{flex:1;margin:0}
.backend-row button{flex-shrink:0;white-space:nowrap}
